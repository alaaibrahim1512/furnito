<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.5.1/css/all.css">
    <link rel="stylesheet" href="style.css.css">
</head>
<body>

<div class="cart-container">
    <div class="cart-header">
        <h2>Shopping Cart</h2>
     </div>
    <hr class="divider">
    <div class="cart-items">
        <div class="item">
            <div class="img-wrapper">
                <img src="..//Carts/cart img/2ac413c1917ac944454e358f73d0af67e1f1b74e.png" alt="Asgaard sofa">
            </div>
            <div class="item-details">
                <h3>Asgaard sofa</h3>
                <div class="item-price-info">
                    <span class="qty">1 <span class="x">x</span></span>
                    <span class="price">Rs. 250,000.00</span>
                </div>
            </div>
        </div>

        <div class="item">
            <div class="img-wrapper">
                <img src="..//Carts/cart img/76149a1a1d489ea6ae7783215d8976dab5c582e3.jpg" alt="Casaliving Wood">
            </div>
            <div class="item-details">
                <h3>Casaliving Wood</h3>
                <div class="item-price-info">
                    <span class="qty">1 <span class="x">x</span></span>
                    <span class="price">Rs. 270,000.00</span>
                </div>
            </div>
        </div>
    </div>
    <div class="cart-footer">
        <hr class="divider">
        <div class="subtotal-row">
            <span class="label">Subtotal</span>
            <span class="total-amount">Rs. 520,000.00</span>
        </div>

        <hr class="divider">

        <div class="btn-container">
            <button class="cart-btn">Cart</button>
        </div>
    </div>
</div>

</body>
</html>
