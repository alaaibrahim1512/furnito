<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furniro | eCommerce</title>
    <link rel="stylesheet" href="product.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <img src="logo.png" alt="Furniro Logo">
            <h2>Furniro</h2>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="Home.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="cart.html.html">Cart</a></li>
                
                
                <li><a href="login1.html" class="login-btn">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="product-container">
        <div class="product-content">
            <div class="product-image">
                <a href="product-details.html" target="_blank">
                    <img src="https://path-to-your-sofa-image.jpg" alt="Asgaard sofa">
                </a>
            </div>

            <div class="product-details">
                <h1>Asgaard sofa</h1>
                <p class="price">Rs. 250,000.00</p>
                <p class="description">
                    Setting the bar as one of the loudest speakers in its class, the Kilburn is a compact, stout-hearted hero with a well-balanced audio which boasts a clear midrange and extended highs for a sound.
                </p>

                <div class="actions">
                    <div class="quantity-selector">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>
                    </div>
                    <button class="btn-add">Add To Cart</button>
                    <button class="btn-compare">+ Compare</button>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
