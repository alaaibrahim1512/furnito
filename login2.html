<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeSpace Interior Design | Login</title>
    <link rel="stylesheet" href="login2.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script src="login2.js"></script>
</head>
<body>
    <div class="full-page-background">
        
        <div class="left-panel-clear">
            </div>

        <div class="right-panel-glass">
            <div class="form-content-wrapper">
                
                <h2 class="brand-logo">Furniro</h2>
                
                <h1 class="heading-welcome">Welcome </h1>
                
                <p class="subheading-description">Create an account to explore modern furniture and exclusive offers.</p>
                
                <form class="login-form" onsubmit="return gotohome()">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="Enter your email" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="enter your password" required>
                    </div>
                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" placeholder="confirm your password" required>
                    </div>
                    
                    <div class="form-actions">
                        <label class="checkbox-remember">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="login-submit-btn">Login</button>
                </form>
                
                <p class="signup-footer-text">You already have an account? <a href="login.html" target="_blank">Sign in </a></p>
                
                
            </div>
        </div>
    </div>
</body>
</html>
